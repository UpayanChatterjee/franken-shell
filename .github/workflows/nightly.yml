name: Nightly compatibility

on:
  schedule:
    - cron: "23 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-compatibility
  cancel-in-progress: true

jobs:
  fedora:
    name: Nightly / Fedora 44 / ${{ matrix.quickshell }}
    runs-on: ubuntu-24.04
    continue-on-error: true
    container: fedora:44
    strategy:
      fail-fast: false
      matrix:
        quickshell:
          - quickshell
          - quickshell-git
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Fedora dependencies
        run: |
          dnf -y install \
            'dnf5-command(copr)' \
            curl \
            git \
            jq \
            nodejs \
            npm \
            procps-ng \
            ripgrep \
            rustup \
            ShellCheck \
            shfmt
          dnf -y copr enable errornointernet/quickshell
          dnf -y install "${{ matrix.quickshell }}"
          rustup toolchain install 1.85.0 \
            --profile minimal \
            --component clippy \
            --component rustfmt
          rustup default 1.85.0
          printf '/usr/lib64/qt6/bin\n' >>"$GITHUB_PATH"
      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.12.0
          cache: npm
      - name: Restore Cargo cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            /root/.cargo/registry
            /root/.cargo/git
            shell/helpers/franken-config-helper/target
          key: fedora-${{ matrix.quickshell }}-cargo-${{ hashFiles('rust-toolchain.toml', 'shell/helpers/franken-config-helper/Cargo.lock') }}
      - name: Install repository tools
        run: ./ci/bootstrap-tools
      - name: Run compatibility suite
        run: ./ci/run all
      - name: Collect diagnostics
        if: always()
        run: ./ci/collect-diagnostics "fedora-${{ matrix.quickshell }}"
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fedora-${{ matrix.quickshell }}-diagnostics
          path: .ci-artifacts/
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 7
